<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>متجر تزويد المتابعين</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff; 
            font-family: sans-serif;
            display: flex;
            justify-content: center;
        }
        .main-wrapper {
            width: 100%;
            max-width: 450px; 
            padding: 0px;
            box-sizing: border-box;
        }
        img {
            display: block;
            width: 100%;
            height: auto;
        }
        .section-header {
            width: 100%;
            margin-bottom: 5px;
        }
        .section-middle {
            display: flex;
            justify-content: space-between;
            gap: 4px;
            padding: 0 4px;
            margin-bottom: 15px;
        }
        .section-middle img {
            width: 49%;
            height: auto;
            object-fit: contain;
        }
        .section-services-title {
            width: 100%;
            margin-bottom: 5px;
        }
        .section-footer-links {
            display: grid;
            grid-template-columns: 1fr;
            gap: 5px;
        }
        .section-footer-links a {
            display: block;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        
        <div class="section-header">
            <img src="header.png.pdf" alt="header">
        </div>

        <div class="section-middle">
            <img src="about_us.png.pdf" alt="about">
            <img src="stats.png.pdf" alt="stats">
        </div>

        <div class="section-services-title">
            <img src="services_title.png.pdf" alt="services">
        </div>

        <div class="section-footer-links">
            <a href="about:blank" target="_blank">
                <img src="facebook.png.pdf" alt="facebook">
            </a>
            <a href="about:blank" target="_blank">
                <img src="instagram.png.pdf" alt="instagram">
            </a>
        </div>

    </div>

</body>
</html>
