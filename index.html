<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>متجر تزويد المتابعين</title>
    <style>
        /* إعدادات الصفحة العامة */
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff; 
            font-family: sans-serif;
            display: flex;
            justify-content: center;
        }

        /* حاوية الموقع الأساسية - تم تقليل الحشوة لإشغال كامل العرض */
        .main-wrapper {
            width: 100%;
            max-width: 450px; /* العرض المثالي لمطابقة التصميم على الهواتف */
            padding: 0px;
            box-sizing: border-box;
        }

        /* إعدادات الصور العامة لملء المساحة المخصصة */
        img {
            display: block;
            width: 100%;
            height: auto;
        }

        /* القسم 1 - الهيدر الرئيسي */
        .section-header {
            width: 100%;
            margin-bottom: 2px;
        }

        /* القسم 2 و 3 - تم تعديل الـ Flex وضبط المقاسات بدقة */
        .section-middle {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2px;
            padding: 0 2px;
            margin-bottom: 10px;
        }

        .section-middle img {
            width: 49.5%; /* لضمان وجودهما بجانب بعض بنفس العرض */
            height: auto;
            aspect-ratio: 1.6; /* يحافظ على نسبة الارتفاع والعرض لتطابق التصميم */
            object-fit: fill; 
        }

        /* القسم 4 - عنوان الخدمات المتوفرة */
        .section-services-title {
            width: 100%;
            margin-bottom: 2px;
        }

        /* القسم 5 و 6 - ضبط الأيقونات لتكون كبيرة وواضحة */
        .section-footer-links {
            display: grid;
            grid-template-columns: 1fr; /* عمودي واحد لكل صورة لضمان الترتيب */
            gap: 0px;
            padding: 0px;
        }

        .section-footer-links a {
            display: block;
            width: 100%;
            text-decoration: none;
            cursor: pointer;
        }

        .section-footer-links img {
            width: 100%;
            height: auto;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        
        <div class="section-header">
            <img src="header.png" alt="header">
        </div>

        <div class="section-middle">
            <img src="about_us.png" alt="about">
            <img src="stats.png" alt="stats">
        </div>

        <div class="section-services-title">
            <img src="services_title.png" alt="services_title">
        </div>

        <div class="section-footer-links">
            <a href="about:blank" target="_blank">
                <img src="facebook.png" alt="facebook">
            </a>
        </div>

        <div class="section-footer-links" style="margin-top: -2px;">
            <a href="about:blank" target="_blank">
                <img src="instagram.png" alt="instagram">
            </a>
        </div>

    </div>

</body>
</html>
